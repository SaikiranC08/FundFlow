
  _format_version: "3.0"

  services:

    - name: auth-service
      url: https://fundflow-auth-service.onrender.com

      routes:
        - name: auth-route
          paths:
            - /auth
          strip_path: true

          plugins:
            - name: cors
              config:
                origins:
                  - https://fundflow-web-tau.vercel.app
                methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                headers:
                  - Authorization
                  - Content-Type
                  - Idempotency-Key
                exposed_headers:
                  - Authorization
                credentials: true
                max_age: 3600

    - name: expense-service
      url: https://fundflow-expense-service.onrender.com

      routes:
        - name: expense-route
          paths:
            - /expense
          strip_path: true

          plugins:

            - name: cors
              config:
                origins:
                  - https://fundflow-web-tau.vercel.app
                methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                headers:
                  - Authorization
                  - Content-Type
                  - Idempotency-Key
                exposed_headers:
                  - Authorization
                credentials: true
                max_age: 3600

            - name: custom-auth

              config:
                auth_service_url: https://fundflow-auth-service.onrender.com/v1/validate

